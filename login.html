<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio de Sesion - Sistema de Ingreso de Datos</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <style>
        :root {
            --color-primary: #3b82f6;
            --color-primary-dark: #2563eb;
            --color-primary-glow: rgba(59, 130, 246, 0.25);
            --color-bg: #0a0e17;
            --color-card: #131a2b;
            --color-card-border: rgba(255, 255, 255, 0.06);
            --color-text: #e2e8f0;
            --color-text-secondary: #94a3b8;
            --color-text-muted: #64748b;
            --color-border: rgba(255, 255, 255, 0.08);
            --color-baja: #ef4444;
            --radius: 12px;
            --radius-sm: 8px;
            --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: var(--color-bg);
            background-image:
                radial-gradient(ellipse at 50% 0%, rgba(59, 130, 246, 0.08) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 80%, rgba(139, 92, 246, 0.06) 0%, transparent 50%);
        }
        .login-box {
            background: var(--color-card);
            padding: 40px;
            border-radius: var(--radius);
            border: 1px solid var(--color-card-border);
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 400px;
            text-align: center;
            animation: fadeIn 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .login-box .logo-icon { margin-bottom: 12px; }
        .login-box h2 {
            color: var(--color-text);
            margin-bottom: 4px;
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }
        .login-box .subtitle {
            color: var(--color-text-muted);
            margin-bottom: 28px;
            font-size: 13px;
        }
        .login-box .form-group {
            text-align: left;
            margin-bottom: 18px;
        }
        .login-box .form-group label {
            display: block;
            margin-bottom: 6px;
            color: var(--color-text-muted);
            font-weight: 600;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }
        .login-box .form-group input {
            width: 100%;
            padding: 12px 14px;
            border: 1.5px solid var(--color-border);
            border-radius: var(--radius-sm);
            font-size: 14px;
            transition: var(--transition);
            background: rgba(255, 255, 255, 0.03);
            color: var(--color-text);
            font-family: inherit;
        }
        .login-box .form-group input:focus {
            outline: none;
            border-color: var(--color-primary);
            box-shadow: 0 0 0 3px var(--color-primary-glow);
            background: rgba(59, 130, 246, 0.05);
        }
        .login-box .form-group input::placeholder { color: var(--color-text-muted); }
        .login-box .btn-login {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, var(--color-primary), var(--color-primary-dark));
            color: white;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            margin-top: 8px;
            font-family: inherit;
            box-shadow: 0 2px 10px var(--color-primary-glow);
        }
        .login-box .btn-login:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 20px var(--color-primary-glow);
        }
        .login-error {
            color: var(--color-baja);
            font-size: 13px;
            margin-top: 12px;
            display: none;
            padding: 10px;
            background: rgba(239, 68, 68, 0.1);
            border-radius: var(--radius-sm);
            border: 1px solid rgba(239, 68, 68, 0.2);
        }
        .login-error.active { display: block; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <div class="logo-icon"><i data-lucide="shield" style="width:48px;height:48px;stroke-width:1.5;color:#3b82f6"></i></div>
            <h2>INGRESO DE DATOS</h2>
            <p class="subtitle">Sistema de Gestion de Confianza</p>

            <form id="form-login">
                <div class="form-group">
                    <label>Usuario</label>
                    <input type="text" id="login-usuario" placeholder="Ingrese usuario" required>
                </div>
                <div class="form-group">
                    <label>Contraseña</label>
                    <input type="password" id="login-password" placeholder="Ingrese contraseña" required>
                </div>
                <button type="submit" class="btn-login"><i data-lucide="log-in" style="width:18px;height:18px;vertical-align:middle;margin-right:6px"></i> Ingresar al Sistema</button>
                <div id="login-error" class="login-error">Usuario o contraseña incorrectos</div>
            </form>
        </div>
    </div>

    <script>
        // Credenciales predefinidas
        const USUARIO_CORRECTO = 'SECCION I';
        const PASSWORD_CORRECTO = 'SECCI2026';

        document.getElementById('form-login').addEventListener('submit', function(e) {
            e.preventDefault();

            const usuario = document.getElementById('login-usuario').value.trim();
            const password = document.getElementById('login-password').value;

            if (usuario === USUARIO_CORRECTO && password === PASSWORD_CORRECTO) {
                // Guardar sesion en sessionStorage
                sessionStorage.setItem('sesion_activa', 'true');
                sessionStorage.setItem('usuario', usuario);
                // Redirigir al sistema
                window.location.href = 'index.html';
            } else {
                document.getElementById('login-error').classList.add('active');
                // Limpiar contraseña
                document.getElementById('login-password').value = '';
            }
        });
        lucide.createIcons();
    </script>
</body>
</html>
